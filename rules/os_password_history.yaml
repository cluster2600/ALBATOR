title: "Enforce Password History (15 Passwords Remembered)"
id: "os_password_history"
severity: "medium"
discussion: "Requiring the system to remember at least 15 previous passwords prevents users from cycling through a small set of passwords. This aligns with CIS Benchmark recommendations for macOS password reuse restrictions."
check: "/usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -q 'policyAttributePasswordHashes' && /usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -oE 'usingHistory[^0-9]*([0-9]+)' | /usr/bin/grep -qE '1[5-9]|[2-9][0-9]'"
fix: "sudo /usr/bin/pwpolicy -setglobalpolicy 'usingHistory=15'"
fix_odv: "sudo /usr/bin/pwpolicy -setglobalpolicy 'usingHistory={ODV_VALUE}'"
references:
  cci: ["CCI-000200"]
  cce: ["CCE-92834-2"]
  800-53r5: ["IA-5(1)"]
  disa_stig: ["V-259765"]
  srg: ["SRG-OS-000077-GPOS-00045"]
odv:
  variable: "password_history_count"
  default: 15
  description: "Number of previous passwords to remember"
  cis_recommendation: 15
  type: "integer"
tags: ["stig", "security", "password"]
result: "pass"
mobileconfig: "missing"
