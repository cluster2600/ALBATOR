title: "Secure Home Folder Permissions"
id: "os_home_folder_permissions"
severity: "medium"
discussion: "User home folders should not be world-readable. Incorrect permissions on home directories can expose sensitive files such as SSH keys, browser data, and application credentials to other local users. CIS Benchmark Section 6.1.3 requires home folder permissions to be set to 700 or more restrictive."
check: "/bin/ls -ld /Users/$(/usr/bin/stat -f '%Su' /dev/console) | /usr/bin/awk '{print $1}' | /usr/bin/grep -q 'drwx------'"
fix: "sudo /bin/chmod 700 /Users/$(/usr/bin/stat -f '%Su' /dev/console)"
references:
  cci: ["CCI-000366"]
  cce: ["CCE-92860-7"]
  800-53r5: ["AC-3", "MP-2"]
  disa_stig: ["V-259790"]
  srg: ["SRG-OS-000480-GPOS-00227"]
odv:
  variable: "home_folder_permissions"
  default: "700"
  description: "Home folder permission mode (octal)"
  cis_recommendation: "700"
  type: "string"
tags: ["stig", "security", "filesystem", "cis_lvl1"]
result: "pass"
mobileconfig: "missing"
