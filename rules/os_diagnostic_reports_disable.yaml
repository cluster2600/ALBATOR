title: "Disable Diagnostic Data Submission to Apple"
id: "os_diagnostic_reports_disable"
severity: "medium"
discussion: "macOS can be configured to automatically send diagnostic and usage data to Apple. This data may contain sensitive information about system configuration and usage patterns. CIS Benchmark Section 2.5.2.1 recommends disabling automatic submission of diagnostic data. Organizations should disable this to prevent potential data leakage."
check: "/usr/bin/defaults read /Library/Application\\ Support/CrashReporter/DiagnosticMessagesHistory.plist AutoSubmit 2>/dev/null | /usr/bin/grep -q '0'"
fix: "sudo /usr/bin/defaults write /Library/Application\\ Support/CrashReporter/DiagnosticMessagesHistory.plist AutoSubmit -bool false"
references:
  cci: ["CCI-000366"]
  cce: ["CCE-92850-8"]
  800-53r5: ["CM-7", "SC-7(10)"]
  disa_stig: ["V-259780"]
  srg: ["SRG-OS-000480-GPOS-00227"]
odv: "missing"
tags: ["stig", "security", "privacy", "cis_lvl2"]
result: "pass"
mobileconfig: "missing"
