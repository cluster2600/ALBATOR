title: "Set Login Window Banner Text"
id: "os_login_window_banner"
severity: "medium"
discussion: "A login window banner provides a legal notice or warning to users before they authenticate. CIS Benchmark Section 5.7 and NIST 800-53 AC-8 require organizations to display a system use notification message before granting access. The banner text file must exist at /Library/Security/PolicyBanner.txt."
check: "/bin/test -f /Library/Security/PolicyBanner.txt && /bin/echo '1' || /bin/echo '0'"
fix: "sudo /bin/cat > /Library/Security/PolicyBanner.txt << 'BANNER'\nThis system is for authorized use only. By using this system, you consent to monitoring and compliance with organizational policies.\nBANNER"
references:
  cci: ["CCI-000048"]
  cce: ["CCE-92845-8"]
  800-53r5: ["AC-8"]
  disa_stig: ["V-259775"]
  srg: ["SRG-OS-000023-GPOS-00006"]
odv: "missing"
tags: ["stig", "security", "login", "cis_lvl1"]
result: "pass"
mobileconfig: "missing"
