title: "Require Complex Passwords"
id: "os_password_complexity"
severity: "high"
discussion: "Passwords must contain a mix of upper-case, lower-case, numeric, and special characters. This prevents dictionary and simple brute-force attacks. macOS enforces this through password policy account policies or a configuration profile."
check: "/usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -q 'requiresMixedCase\\|requiresAlpha\\|requiresNumeric\\|requiresSymbol'"
fix: "sudo /usr/bin/pwpolicy -setglobalpolicy 'requiresAlpha=1 requiresNumeric=1 requiresSymbol=1'"
references:
  cci: ["CCI-000192", "CCI-000193", "CCI-000194", "CCI-000195"]
  cce: ["CCE-92833-4"]
  800-53r5: ["IA-5(1)"]
  disa_stig: ["V-259764"]
  srg: ["SRG-OS-000069-GPOS-00037", "SRG-OS-000070-GPOS-00038", "SRG-OS-000071-GPOS-00039"]
odv: "none"
tags: ["stig", "security", "password"]
result: "pass"
mobileconfig: "missing"
