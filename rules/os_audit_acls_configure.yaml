title: "Configure Audit Log Folder Access Control"
id: "os_audit_acls_configure"
severity: "high"
discussion: "Audit log files must be owned by root and not readable or writable by other users. Improper permissions on audit logs could allow unauthorized modification or deletion of audit evidence."
check: "/bin/ls -ld /var/audit | /usr/bin/awk '{print $1, $3, $4}' | /usr/bin/grep -q 'drwx------ root wheel'"
fix: "sudo /bin/chmod 700 /var/audit; sudo /usr/sbin/chown root:wheel /var/audit"
references:
  cci: ["CCI-000162", "CCI-000163", "CCI-000164"]
  cce: ["CCE-92832-6"]
  800-53r5: ["AU-9"]
  disa_stig: ["V-259759"]
  srg: ["SRG-OS-000057-GPOS-00027", "SRG-OS-000058-GPOS-00028", "SRG-OS-000059-GPOS-00029"]
odv: "none"
tags: ["stig", "security", "audit"]
result: "pass"
mobileconfig: "missing"
