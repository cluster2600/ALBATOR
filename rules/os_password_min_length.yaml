title: "Set Minimum Password Length to 15 Characters"
id: "os_password_min_length"
severity: "high"
discussion: "Enforcing a minimum password length of 15 characters reduces the risk of brute-force attacks. CIS recommends at least 15 characters for macOS accounts. The pwpolicy command configures the global password policy on macOS."
check: "/usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -q 'policyAttributePassword Length' && /usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -oE 'minLength[^0-9]*([0-9]+)' | /usr/bin/grep -qE '1[5-9]|[2-9][0-9]'"
fix: "sudo /usr/bin/pwpolicy -setglobalpolicy 'minChars=15'"
fix_odv: "sudo /usr/bin/pwpolicy -setglobalpolicy 'minChars={ODV_VALUE}'"
references:
  cci: ["CCI-000205"]
  cce: ["CCE-92832-6"]
  800-53r5: ["IA-5(1)"]
  disa_stig: ["V-259763"]
  srg: ["SRG-OS-000078-GPOS-00046"]
odv:
  variable: "password_min_length"
  default: 15
  description: "Minimum password length in characters"
  cis_recommendation: 15
  type: "integer"
tags: ["stig", "security", "password"]
result: "pass"
mobileconfig: "missing"
