title: "Configure Install Log Retention to 365 Days"
id: "os_install_log_retention_configure"
severity: "medium"
discussion: "The install.log file must be retained for at least 365 days. This log records software installation activity and is critical for forensic analysis. The asl.conf TTL setting controls retention."
check: "/usr/bin/grep -q 'install.log.*ttl=365' /etc/asl/com.apple.install"
fix: "sudo /usr/bin/sed -i '' 's/^\\(.*install.log.*\\)ttl=[0-9]*/\\1ttl=365/' /etc/asl/com.apple.install"
check_odv: "/usr/bin/grep -q 'install.log.*ttl={ODV_VALUE}' /etc/asl/com.apple.install"
fix_odv: "sudo /usr/bin/sed -i '' 's/^\\(.*install.log.*\\)ttl=[0-9]*/\\1ttl={ODV_VALUE}/' /etc/asl/com.apple.install"
references:
  cci: ["CCI-000366"]
  cce: ["CCE-92833-4"]
  800-53r5: ["AU-11"]
  disa_stig: ["V-259760"]
  srg: ["SRG-OS-000480-GPOS-00227"]
odv:
  variable: "install_log_retention_days"
  default: 365
  description: "Install log retention period in days"
  cis_recommendation: 365
  type: "integer"
tags: ["stig", "security", "audit"]
result: "pass"
mobileconfig: "missing"
