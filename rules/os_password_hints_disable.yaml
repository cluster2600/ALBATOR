title: "Disable Password Hints at Login Window"
id: "os_password_hints_disable"
severity: "medium"
discussion: "Password hints provide information that could assist an attacker in guessing passwords. CIS Benchmark Section 5.9 recommends disabling the display of password hints at the login window. This prevents accidental disclosure of password-related information."
check: "/usr/bin/defaults read /Library/Preferences/com.apple.loginwindow RetriesUntilHint 2>/dev/null | /usr/bin/grep -c '0'"
fix: "sudo /usr/bin/defaults write /Library/Preferences/com.apple.loginwindow RetriesUntilHint -int 0"
references:
  cci: ["CCI-000366"]
  cce: ["CCE-92843-3"]
  800-53r5: ["IA-6"]
  disa_stig: ["V-259773"]
  srg: ["SRG-OS-000480-GPOS-00227"]
odv: "missing"
tags: ["stig", "security", "login", "cis_lvl1"]
result: "pass"
mobileconfig: "missing"
