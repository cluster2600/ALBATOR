title: "Set Maximum Password Age to 365 Days"
id: "os_password_max_age"
severity: "medium"
discussion: "Passwords must be changed within a defined period to limit the window of exposure if credentials are compromised. CIS recommends a maximum password age of 365 days. macOS enforces this through global password policy settings."
check: "/usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -q 'policyAttributeExpiresEveryN' && /usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -oE 'maxMinutesUntilChangePassword[^0-9]*([0-9]+)'"
fix: "sudo /usr/bin/pwpolicy -setglobalpolicy 'maxMinutesUntilChangePassword=525600'"
references:
  cci: ["CCI-000199"]
  cce: ["CCE-92835-9"]
  800-53r5: ["IA-5(1)"]
  disa_stig: ["V-259766"]
  srg: ["SRG-OS-000076-GPOS-00044"]
odv:
  variable: "password_max_age_days"
  default: 365
  description: "Maximum password age in days"
  cis_recommendation: 365
  type: "integer"
tags: ["stig", "security", "password"]
result: "pass"
mobileconfig: "missing"
