title: "Configure Security Auditing Flags"
id: "os_audit_flags_configure"
severity: "high"
discussion: "The audit system must be configured to record access, modification, and deletion events. The flags lo,ad,fd,fm,-all ensure login/logout, administrative, file deletion, file attribute modification, and failed events are audited."
check: "/usr/bin/grep -q '^flags:.*lo' /etc/security/audit_control && /usr/bin/grep -q '^flags:.*ad' /etc/security/audit_control && /usr/bin/grep -q '^flags:.*fd' /etc/security/audit_control && /usr/bin/grep -q '^flags:.*fm' /etc/security/audit_control && /usr/bin/grep -q '^flags:.*-all' /etc/security/audit_control"
fix: "sudo /usr/bin/sed -i '' 's/^flags:.*/flags:lo,ad,fd,fm,-all/' /etc/security/audit_control; sudo /usr/sbin/audit -s"
references:
  cci: ["CCI-000130", "CCI-000135", "CCI-000169", "CCI-000172"]
  cce: ["CCE-92830-0"]
  800-53r5: ["AU-3", "AU-3(1)", "AU-12"]
  disa_stig: ["V-259757"]
  srg: ["SRG-OS-000037-GPOS-00015", "SRG-OS-000039-GPOS-00017", "SRG-OS-000458-GPOS-00203"]
odv:
  variable: "audit_flags"
  default: "lo,ad,fd,fm,-all"
  description: "Audit flags for /etc/security/audit_control"
  cis_recommendation: "lo,ad,fd,fm,-all"
  type: "string"
tags: ["stig", "security", "audit"]
result: "pass"
mobileconfig: "missing"
