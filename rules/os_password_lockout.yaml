title: "Set Account Lockout Threshold to 5 Failed Attempts"
id: "os_password_lockout"
severity: "high"
discussion: "Locking an account after 5 consecutive failed login attempts mitigates brute-force password attacks. The account should lock for a minimum period before allowing further attempts. macOS configures this via the global password policy."
check: "/usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -q 'policyAttributeMaximumFailedAuthentications' && /usr/bin/pwpolicy -getaccountpolicies 2>/dev/null | /usr/bin/grep -oE 'maxFailedLoginAttempts[^0-9]*([0-9]+)' | /usr/bin/grep -qE '^maxFailedLoginAttempts[^0-9]*[1-5]$'"
fix: "sudo /usr/bin/pwpolicy -setglobalpolicy 'maxFailedLoginAttempts=5'"
fix_odv: "sudo /usr/bin/pwpolicy -setglobalpolicy 'maxFailedLoginAttempts={ODV_VALUE}'"
references:
  cci: ["CCI-002238", "CCI-000044"]
  cce: ["CCE-92836-7"]
  800-53r5: ["AC-7"]
  disa_stig: ["V-259767"]
  srg: ["SRG-OS-000329-GPOS-00128", "SRG-OS-000021-GPOS-00005"]
odv:
  variable: "password_lockout_attempts"
  default: 5
  description: "Maximum failed login attempts before account lockout"
  cis_recommendation: 5
  type: "integer"
tags: ["stig", "security", "password"]
result: "pass"
mobileconfig: "missing"
